name: Preview deploy PR (use main workflow)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Use workflow from Branch:main only above. Enter branch, tag, PR ref, or commit to build below:'
        required: true
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "pages-preview"
  cancel-in-progress: false

jobs:
  build-preview:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      preview_ref: ${{ steps.set-ref.outputs.preview_ref }}
      base_path: ${{ steps.set-ref.outputs.base_path }}
      branch_name: ${{ steps.set-ref.outputs.branch_name }}

    steps:
      - name: Determine ref to build
        id: set-ref
        run: |
          REF="${{ github.event.inputs.ref }}"
          REF="${REF#refs/heads/}"
          REF="$(echo "$REF" | sed -E 's#/{2,}#/#g' | sed -E 's#^/##; s#/$##')"
          BASE_PATH="/previews/${REF}"
          BRANCH_NAME="ci/preview-$(echo "$REF" | tr '/[:space:]' '-' | tr -cd '[:alnum:]-._')"

          echo "preview_ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.set-ref.outputs.preview_ref }}
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.6'
          bundler-cache: true
          cache-version: 0

      - name: Debug plugin presence
        run: |
          ls -la _plugins/
          cat _plugins/lang_pages.rb

      - name: Test plugin syntax
        run: ruby -c _plugins/lang_pages.rb

      - name: Build preview with Jekyll
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.set-ref.outputs.base_path }}" \
            --destination ./_site

      - name: Check generated pages
        run: |
          echo "Pages in _site:"
          find ./_site -name "*.html" | head -20

      - name: Upload built preview
        uses: actions/upload-artifact@v4
        with:
          name: preview-site
          path: ./_site

  publish-preview:
    needs: build-preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download built preview
        uses: actions/download-artifact@v4
        with:
          name: preview-site
          path: preview-temp

      - name: Copy preview into previews/<ref>
        id: stage
        run: |
          REF="${{ needs.build-preview.outputs.preview_ref }}"
          TARGET_DIR="previews/${REF}"

          mkdir -p "$(dirname "${TARGET_DIR}")"
          rm -rf "${TARGET_DIR}"
          cp -R "preview-temp/." "${TARGET_DIR}"

          git add -A "${TARGET_DIR}"

          if git diff --cached --quiet; then
            echo "No changes to commit for preview."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.stage.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: add preview for ${{ needs.build-preview.outputs.preview_ref }} [skip ci]"
          branch: ${{ needs.build-preview.outputs.branch_name }}
          delete-branch: true
          base: main
          title: "ci: add preview for ${{ needs.build-preview.outputs.preview_ref }}"
          body: |
            Automated preview publish for `${{ needs.build-preview.outputs.preview_ref }}`.

            Preview URL after merge:
            `https://pankosmia.dev${{ needs.build-preview.outputs.base_path }}`

      - name: Output preview URL
        run: |
          echo "Preview will be available after merge at: https://pankosmia.dev${{ needs.build-preview.outputs.base_path }}"
