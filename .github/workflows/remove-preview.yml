name: Remove preview PR (use main workflow)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Use workflow from Branch:main only above. Enter preview ref to remove below:'
        required: true
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  remove-preview:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Determine preview path
        id: preview
        run: |
          REF="${{ github.event.inputs.ref }}"
          REF="${REF#refs/heads/}"
          REF="$(echo "$REF" | sed -E 's#/{2,}#/#g' | sed -E 's#^/##; s#/$##')"
          PREVIEW_PATH="previews/${REF}"
          BRANCH_NAME="ci/remove-preview-$(echo "$REF" | tr '/[:space:]' '-' | tr -cd '[:alnum:]-._')"

          echo "preview_path=${PREVIEW_PATH}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove preview folder
        id: remove
        run: |
          TARGET="${{ steps.preview.outputs.preview_path }}"
          if [ ! -d "$TARGET" ]; then
            echo "Preview path $TARGET does not exist on main; nothing to remove."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf "$TARGET"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.remove.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: remove preview ${{ steps.preview.outputs.preview_path }} [skip ci]"
          branch: ${{ steps.preview.outputs.branch_name }}
          delete-branch: true
          title: "ci: remove preview ${{ steps.preview.outputs.preview_path }}"
          body: |
            Automated removal of preview folder `${{ steps.preview.outputs.preview_path }}`.
          base: main
